name: Linux Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Strict Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go vet
        shell: bash
        run: |
          set -euo pipefail
          go vet ./...

      - name: Run full test suite
        shell: bash
        run: |
          set -euo pipefail
          FLAGS="-count=1 -shuffle=on -v"
          go test ./... $FLAGS -race

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cgo: "0"
            tags: ""
            asset_name: sudoku-linux-amd64
          - goos: linux
            goarch: arm64
            cgo: "0"
            tags: ""
            asset_name: sudoku-linux-arm64
          - goos: android
            goarch: arm64
            cgo: "0"
            tags: ""
            asset_name: sudoku-android-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          OUTPUT_NAME=sudoku
          go build ${{ matrix.tags }} -ldflags "-s -w" -o $OUTPUT_NAME ./cmd/sudoku-tunnel

      - name: Package Assets
        run: |
          BINARY_NAME=sudoku
          ASSET_NAME=${{ matrix.asset_name }}
          
          cp configs/server.config.json server.config.json
          cp configs/client.config.json client.config.json
          cp configs/README.md CONFIG-README.md
          cp configs/README.zh_CN.md CONFIG-README.zh_CN.md
          
          tar -czvf ${ASSET_NAME}.tar.gz ${BINARY_NAME} server.config.json client.config.json CONFIG-README.md CONFIG-README.zh_CN.md

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz
          if-no-files-found: error
          retention-days: 1
